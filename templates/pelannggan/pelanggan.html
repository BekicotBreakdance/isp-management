<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelanggan - ISP Management</title>

    <style>
        body{margin:0;font-family:Arial, sans-serif;background:#f4f6f9;}
        .sidebar{width:220px;height:100vh;background:#1e3a8a;color:white;position:fixed;padding:20px;}
        .sidebar h2{margin-bottom:30px;}
        .sidebar ul{list-style:none;padding:0;}
        .sidebar ul li{padding:12px;margin-bottom:10px;background:rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;}
        .main{margin-left:260px;padding:20px;}
        table{width:100%;margin-top:30px;border-collapse:collapse;background:white;}
        table th, table td{padding:15px;border-bottom:1px solid #ddd;}
        table th{background:#1e3a8a;color:white;}
        .toolbar{display:flex;gap:12px;align-items:center;justify-content:flex-end;}
        .btn{padding:10px 14px;border:0;border-radius:8px;background:#1e3a8a;color:#fff;cursor:pointer;}
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>ISP Admin</h2>
        <ul>
            <li>Dashboard</li>
            <li>Pelanggan</li>
            <li>Paket Internet</li>
            <li>Teknisi</li>
        </ul>
    </div>

    <div class="main">
        <h1>Data Pelanggan</h1>
        <div class="toolbar">
            <button class="btn" type="button">Tambah Pelanggan</button>
        </div>

        <table>
            <tr>
                <th>ID</th>
                <th>Nama</th>
                <th>Alamat</th>
                <th>No. HP</th>
                <th>Aksi</th>
            </tr>
            <tr>
                <td>1</td>
                <td>Robi</td>
                <td>Jl. Merdeka</td>
                <td>0812xxxxxx</td>
                <td><button class="btn" type="button">Edit</button></td>
            </tr>
        </table>
    </div>
</body>
</html>
